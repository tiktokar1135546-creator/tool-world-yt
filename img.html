<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Downloader</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(-45deg,#0f172a,#111827,#312e81,#0f766e);
background-size:400% 400%;

animation:bg 12s ease infinite;

overflow:hidden;

}

@keyframes bg{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

.card{

width:650px;
padding:45px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(18px);

border-radius:25px;

box-shadow:0 15px 40px rgba(0,0,0,.4);

text-align:center;

color:white;

}

.logo{

font-size:70px;

}

h1{

margin:10px 0;

font-size:35px;

}

p{

color:#ddd;

margin-bottom:35px;

}

.input{

display:flex;

gap:15px;

}

input{

flex:1;

padding:18px;

border:none;

border-radius:12px;

font-size:16px;

outline:none;

}

button{

width:180px;

background:#00d4ff;

color:white;

border:none;

border-radius:12px;

font-size:18px;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:translateY(-4px);

background:#0099ff;

box-shadow:0 10px 25px rgba(0,212,255,.4);

}

.features{

display:flex;

justify-content:space-between;

margin-top:35px;

}

.box{

width:31%;

background:rgba(255,255,255,.06);

padding:18px;

border-radius:15px;

transition:.3s;

}

.box:hover{

transform:translateY(-8px);

background:rgba(255,255,255,.12);

}

.circle{

position:absolute;

border-radius:50%;

background:rgba(255,255,255,.08);

animation:float 10s infinite linear;

}

.circle:nth-child(1){

width:200px;
height:200px;
left:-50px;
top:-50px;

}

.circle:nth-child(2){

width:300px;
height:300px;
right:-100px;
bottom:-100px;

}

@keyframes float{

50%{

transform:translateY(-25px);

}

}

</style>

</head>

<body>

<div class="circle"></div>

<div class="circle"></div>

<div class="card">

<div class="logo">🎬</div>

<h1>Ultimate Video Downloader</h1>

<p>Fast • Modern • Beautiful Interface</p>

<div class="input">

<input placeholder="Paste video URL here...">

<button>Download</button>

</div>

<div class="features">

<div class="box">
<h3>⚡ Fast</h3>
<p>Lightning speed.</p>
</div>

<div class="box">
<h3>🎥 HD</h3>
<p>High quality support.</p>
</div>

<div class="box">
<h3>🔒 Secure</h3>
<p>Safe downloads.</p>
</div>

</div>

</div>

</body>
</html>
